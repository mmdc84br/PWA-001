<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            font-family: sans-serif; 
            display: grid; 
            place-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5;
        }
        .card { padding: 2rem; background: white; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Olá, Mundo! 🚀</h1>
        <p>Este é um Aplicativo Web Progressivo.</p>
    </div>

    <script>
        // Registra o Service Worker para permitir instalação e uso offline
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker registrado com sucesso!"))
                .catch(err => console.log("Erro ao registrar Service Worker:", err));
        }
    </script>
</body>
</html>
